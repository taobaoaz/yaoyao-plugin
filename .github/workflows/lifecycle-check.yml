name: Lifecycle Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lifecycle-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Run lifecycle check
        run: |
          chmod +x scripts/lifecycle-check.sh
          ./scripts/lifecycle-check.sh

      - name: Run unit tests
        run: npm test
